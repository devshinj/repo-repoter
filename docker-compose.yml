services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: autobriify
      POSTGRES_USER: autobriify
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autobriify"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
