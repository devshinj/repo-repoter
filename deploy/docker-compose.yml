services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: autobriify
      POSTGRES_USER: autobriify
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autobriify"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    image: autobriify:latest
    ports:
      - "16000:3000"
    extra_hosts:
      - "hrms.cudo.co.kr:192.168.102.2"
      - "logicraft.cudo.co.kr:192.168.102.2"
      - "open-llm.cudo.co.kr:192.168.102.107"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      DATABASE_URL: postgresql://autobriify:${POSTGRES_PASSWORD}@db:5432/autobriify
      QWEN_CODER_KEY: ${QWEN_CODER_KEY}
      QWEN_MODEL: ${QWEN_MODEL}
      QWEN_API_URL: ${QWEN_API_URL}
      AUTH_HRMS_ID: ${AUTH_HRMS_ID}
      AUTH_HRMS_SECRET: ${AUTH_HRMS_SECRET}
      AUTH_HRMS_ISSUER: ${AUTH_HRMS_ISSUER}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/briify"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
