services:
  app:
    image: autobriify:latest
    ports:
      - "16000:3000"
    extra_hosts:
      - "hrms.cudo.co.kr:192.168.102.2"
    volumes:
      - app-data:/app/data
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      AUTH_HRMS_ID: ${AUTH_HRMS_ID}
      AUTH_HRMS_SECRET: ${AUTH_HRMS_SECRET}
      AUTH_HRMS_ISSUER: ${AUTH_HRMS_ISSUER}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/briify"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  app-data:
